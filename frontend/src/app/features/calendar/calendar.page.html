<section class="dashboard-page">
  <header class="page-header">
    <h1>BiotechCal</h1>
    <p>Biotech catalyst calendar and data management.</p>
  </header>

  <mat-tab-group animationDuration="200ms">
    <mat-tab label="Calendar">
      <div class="tab-content">
        <app-calendar-view></app-calendar-view>
      </div>
    </mat-tab>

    <mat-tab label="Manage Data">
      <div class="tab-content">
        <div class="dashboard-grid">
          <mat-card class="dashboard-card">
            <mat-card-header>
              <mat-card-title>Company Form</mat-card-title>
              <mat-card-subtitle>Create and manage companies</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
              <app-company-form></app-company-form>
            </mat-card-content>
          </mat-card>

          <mat-card class="dashboard-card">
            <mat-card-header>
              <mat-card-title>Catalyst Form</mat-card-title>
              <mat-card-subtitle>Create and manage catalysts</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
              <app-catalyst-form></app-catalyst-form>
            </mat-card-content>
          </mat-card>

          <mat-card class="dashboard-card dashboard-card--full">
            <mat-card-header>
              <mat-card-title>Companies</mat-card-title>
            </mat-card-header>
            <mat-card-content>
              <app-company-list></app-company-list>
            </mat-card-content>
          </mat-card>

          <mat-card class="dashboard-card dashboard-card--full">
            <mat-card-header>
              <mat-card-title>Catalysts</mat-card-title>
            </mat-card-header>
            <mat-card-content>
              <app-catalyst-list></app-catalyst-list>
            </mat-card-content>
          </mat-card>
        </div>
      </div>
    </mat-tab>
  </mat-tab-group>
</section>
